name: Weekly Stale Job Check

on:
  schedule:
    # Every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      days_old:
        description: 'Deactivate jobs older than N days'
        required: false
        default: '14'

jobs:
  stale-check:
    name: Deactivate dead listings
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies (no browser needed)
        run: |
          pip install psycopg2-binary python-dotenv aiohttp

      - name: Run stale check
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE:  require
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd crawler
          DAYS="${{ github.event.inputs.days_old || '14' }}"
          python main.py --check-stale --days-old "$DAYS"

      - name: Report summary
        if: always()
        run: |
          echo "### Stale check complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Time (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Days threshold | ${{ github.event.inputs.days_old || '14' }} |" >> $GITHUB_STEP_SUMMARY
