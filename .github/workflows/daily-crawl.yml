name: Daily Job Discovery

on:
  schedule:
    # 6:00 AM UTC = 7:00 AM Berlin (CET) / 8:00 AM (CEST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI
    inputs:
      company_limit:
        description: 'Max companies to process (blank = all)'
        required: false
        default: ''

jobs:
  discover:
    name: Crawl job boards
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install Playwright Chromium (used by Crawl4AI)
        run: playwright install chromium --with-deps

      - name: Run discovery
        env:
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          POSTGRES_HOST:       ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:       ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB:         ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:       ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:   ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE:    require
        run: |
          cd crawler
          LIMIT="${{ github.event.inputs.company_limit }}"
          if [ -n "$LIMIT" ]; then
            python main.py --discover --company-limit "$LIMIT"
          else
            python main.py --discover
          fi

      - name: Report summary
        if: always()
        run: |
          echo "### Crawl run complete" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
