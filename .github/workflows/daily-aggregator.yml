name: Daily Aggregator Fetch

on:
  schedule:
    # 5:00 AM UTC — runs before the main board crawler at 6:00 AM
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Max pages to fetch from Arbeitnow (each ~100 jobs)'
        required: false
        default: '20'

jobs:
  fetch-aggregators:
    name: Pull jobs from Arbeitnow API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      # No browser needed — Arbeitnow is a plain JSON API
      - name: Install Python dependencies (lightweight)
        run: pip install psycopg2-binary python-dotenv aiohttp openai

      - name: Verify DB connectivity
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          sudo apt-get install -y postgresql-client dnsutils -q
          HOST="${{ secrets.POSTGRES_HOST }}"
          IPV4=$(dig +short A "$HOST" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$IPV4" ]; then
            echo "ERROR: $HOST has no IPv4 address. Use the Supabase Session Pooler host."
            exit 1
          fi
          echo "OK: $HOST → $IPV4"
          psql "host=$HOST port=${{ secrets.POSTGRES_PORT }} dbname=${{ secrets.POSTGRES_DB }} user=${{ secrets.POSTGRES_USER }} sslmode=require" \
            -c "SELECT count(*) AS total_jobs FROM public.job_postings WHERE is_active = true;"

      - name: Fetch from Arbeitnow
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE:  require
        run: |
          cd crawler
          PAGES="${{ github.event.inputs.pages || '20' }}"
          python main.py --fetch-aggregators --pages "$PAGES"

      - name: Report summary
        if: always()
        run: |
          echo "### Aggregator fetch complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages fetched | ${{ github.event.inputs.pages || '20' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Est. jobs processed | up to $(( ${{ github.event.inputs.pages || 20 }} * 100 )) |" >> $GITHUB_STEP_SUMMARY
