name: Monthly Company Discovery

on:
  schedule:
    # 1st of every month at 2:00 AM UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max companies to upsert (blank = no limit)'
        required: false
        default: ''

jobs:
  discover-companies:
    name: Discover and seed companies
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 libwayland-client0

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install browser via crawl4ai-setup
        run: crawl4ai-setup
        env:
          CRAWL4AI_VERBOSE: "false"

      - name: Verify DB connectivity
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          sudo apt-get install -y postgresql-client dnsutils -q
          HOST="${{ secrets.POSTGRES_HOST }}"
          IPV4=$(dig +short A "$HOST" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$IPV4" ]; then
            echo "ERROR: $HOST has no IPv4 address. Use the Supabase Session Pooler host."
            exit 1
          fi
          echo "OK: $HOST → $IPV4"
          psql "host=$HOST port=${{ secrets.POSTGRES_PORT }} dbname=${{ secrets.POSTGRES_DB }} user=${{ secrets.POSTGRES_USER }} sslmode=require" \
            -c "SELECT count(*) AS current_companies FROM public.companies;"

      - name: Run company discovery
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE:  require
        run: |
          cd crawler
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            python main.py --discover-companies --limit "$LIMIT"
          else
            python main.py --discover-companies
          fi

      - name: Report summary
        if: always()
        run: |
          echo "### Company discovery complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Limit | ${{ github.event.inputs.limit || 'none' }} |" >> $GITHUB_STEP_SUMMARY
